events {
    worker_connections 1024;
}

http {
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=graphql_limit:10m rate=5r/s;

    # Upstream services
    upstream vessels_web {
        server vessels_web_server:5000;
    }

    upstream payment_service {
        server payment_service:3000;
    }

    # Map for API key validation
    map $http_authorization $api_key_valid {
        default 0;
        "~^Bearer\s+(.+)$" 1;
    }

    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Health check endpoint (no auth required)
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Voice UI and web interface (Python Flask)
        location / {
            proxy_pass http://vessels_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Rate limiting
            limit_req zone=api_limit burst=20 nodelay;
        }

        # Voice processing API (Python Flask)
        location /api/voice/ {
            proxy_pass http://vessels_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Rate limiting
            limit_req zone=api_limit burst=10 nodelay;

            # Request size limit
            client_max_body_size 1M;
        }

        # Content generation API (Python Flask)
        location /api/content/ {
            proxy_pass http://vessels_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            limit_req zone=api_limit burst=10 nodelay;
            client_max_body_size 1M;
        }

        # Grant APIs (Python Flask)
        location /api/grants/ {
            proxy_pass http://vessels_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            limit_req zone=api_limit burst=10 nodelay;
            client_max_body_size 1M;
        }

        # Payment GraphQL API (TypeScript)
        # Requires authentication
        location /graphql {
            # Validate JWT token
            if ($api_key_valid = 0) {
                return 401 '{"errors":[{"message":"Unauthorized - Missing or invalid token"}]}';
            }

            proxy_pass http://payment_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;

            # Rate limiting (stricter for financial operations)
            limit_req zone=graphql_limit burst=5 nodelay;

            # Request size limit
            client_max_body_size 100k;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Payment webhooks (TypeScript)
        # These need special handling for external services
        location /webhooks/ {
            proxy_pass http://payment_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Webhook-specific rate limiting
            limit_req zone=api_limit burst=5 nodelay;

            client_max_body_size 10k;
        }

        # System status endpoint (Python Flask)
        location /api/status {
            proxy_pass http://vessels_web;
            proxy_set_header Host $host;

            access_log off;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}
