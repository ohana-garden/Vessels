version: '3.8'

services:
  # ============================================================================
  # DATABASES & STORAGE
  # ============================================================================

  falkordb:
    image: falkordb/falkordb:latest
    container_name: vessels-falkordb
    ports:
      - "6379:6379"
    volumes:
      - falkordb-data:/data
    restart: unless-stopped
    command: >
      --save 900 1
      --save 300 10
      --save 60 10000
      --dbfilename dump.rdb
      --dir /data
      --appendonly no
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    networks:
      - vessels-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:13
    container_name: vessels-postgres
    environment:
      POSTGRES_DB: vessels
      POSTGRES_USER: vessels
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - vessels-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vessels"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # APPLICATION SERVICES
  # ============================================================================

  vessels_web_server:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: vessels-web-server
    depends_on:
      falkordb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=vessels
      - POSTGRES_USER=vessels
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=production
    ports:
      - "5000:5000"
    volumes:
      - ./work_dir:/app/work_dir
      - ./vessels:/app/vessels
    networks:
      - vessels-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # payment_service:
  #   build:
  #     context: ./payment
  #     dockerfile: Dockerfile
  #   container_name: vessels-payment-service
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     - DATABASE_URL=postgresql://vessels:${POSTGRES_PASSWORD}@postgres:5432/vessels
  #     - JWT_SECRET=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
  #     - NODE_ENV=production
  #   ports:
  #     - "3000:3000"
  #   networks:
  #     - vessels-network
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  # ============================================================================
  # API GATEWAY
  # ============================================================================

  nginx_gateway:
    image: nginx:alpine
    container_name: vessels-nginx-gateway
    depends_on:
      - vessels_web_server
      # - payment_service
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-gateway.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    networks:
      - vessels-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  falkordb-data:
    driver: local
  postgres-data:
    driver: local
  nginx-logs:
    driver: local

networks:
  vessels-network:
    driver: bridge
